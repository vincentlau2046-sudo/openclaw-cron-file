enabled: true
schedule:
  kind: cron
  expr: "0 19 * * 0"
  tz: Asia/Shanghai
sessionTarget: isolated
payload:
  kind: agentTurn
  timeoutSeconds: 600
  message: |
    学习循环周复盘任务 v3（Obsidian 驱动）
