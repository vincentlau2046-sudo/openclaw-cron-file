name: 情报-每日-论文精读
enabled: true
schedule:
  kind: cron
  expr: "30 5 * * *"
  tz: Asia/Shanghai
sessionTarget: isolated
payload:
  kind: agentTurn
  timeoutSeconds: 2400
  lightContext: true
  message: |
    生成今日 AI 论文精读（公众号级别质量），使用 2026 年新分析框架：

    【第一步：搜索最新高价值论文（三级降级高可用）】
    - 第1级：Tavily 搜索 arXiv 论文
    - 第2级：Baidu 降级
    - 第3级：web_fetch 固定信息源降级（arXiv CS.CL/CS.AI/CS.LG, HuggingFace Papers）
    - 筛选 3-5 篇最优内容

    【第二步：第一性原理深度分析】
    - 核心问题、本质洞察、技术方案、实验结果、批判性思考、商业价值

    【第三步：系统思维关联】
    - 技术趋势连线、产业链影响、趋势雷达

    【第四步：生成公众号级报告】
    - 一句话洞察、论文矩阵、深度解析、行动建议、趋势雷达、今日金句
    - 字数 1500-2000 字，语言口语化

    【第五步：文件保存（Obsidian 主输出）】
    - 路径: /home/Vincent/Documents/Obsidian vault/零壹日记本/01-工作/AI情报/01-每日情报/01-论文精读/YYYY-MM-DD.md

    【第六步：同步到飞书云盘】
    - 创建文档 → 写入内容 → 验证 block_count > 1 → 飞书推送摘要
    - folder_token: Cd7vfKY0ElyM7NdMu7qcfeqWnPe

delivery:
  mode: announce
  channel: feishu
  to: ou_01c7bc2227dc9960a4388a1db7e86ddc
