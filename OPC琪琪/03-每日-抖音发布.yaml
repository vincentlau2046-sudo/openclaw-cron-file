name: OPC琪琪-每日-抖音发布
description: 每日 19:45 自动发布琪琪故事视频到抖音
enabled: true
schedule:
  kind: cron
  expr: "45 19 * * *"
sessionTarget: isolated
payload:
  kind: agentTurn
  message: |
    琪琪故事抖音自动发布流程
    - 读取发布队列（pending_*.json）
