name: OPC琪琪-每日-抖音发布
description: 每日 19:45 自动发布琪琪故事视频到抖音
enabled: true
schedule:
  kind: cron
  expr: "45 19 * * *"
sessionTarget: isolated
payload:
  kind: agentTurn
  message: |
    琪琪故事抖音自动发布流程

    ## 第一步：选择发布对象
    - 读取状态索引，找到"视频✅发布❌"的最早期数
    - 如全部已发布 → 飞书通知用户后退出

    ## 第二步：读取发布队列
    - 检查 publish-queue/ 目录，找到对应期数的 pending JSON
    - 读取视频路径、标题、描述、话题

    ## 第三步：浏览器登录 + 上传视频
    - 导航到抖音创作者中心
    - 上传视频，等待预审通过

    ## 第四步：填写标题和描述 + 发布
    - 填写标题、描述（含选品推荐文案）
    - 勾选"公开"+"立即发布"
    - 点击发布

    ## 第五步：记录与清理
    - 创建发布日志到 07-发布记录/发布日志/
    - 更新状态索引发布列为✅
    - **立即删除 pending JSON 文件（防止重复发布）**
    - 关闭浏览器

    注意：商品以推荐文案形式加入描述，暂不操作原生商品挂载。

delivery:
  mode: announce
  channel: feishu
  to: ou_01c7bc2227dc9960a4388a1db7e86ddc
