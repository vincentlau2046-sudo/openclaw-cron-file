name: 股票-每周-候选池自动筛选
enabled: true
schedule:
  kind: cron
  expr: "0 20 * * 3"
  tz: Asia/Shanghai
sessionTarget: isolated
payload:
  kind: agentTurn
  timeoutSeconds: 300
  message: |
    候选股票池自动筛选（每周三 20:00）
    - 从本周资讯中提取股票线索
    - 基本面筛选（淘汰ST/概念炒作/小盘）
    - 评分（产业趋势/公司地位/业绩/催化）
    - 更新候选池文件

delivery:
  mode: announce
  channel: feishu
  to: ou_01c7bc2227dc9960a4388a1db7e86ddc
